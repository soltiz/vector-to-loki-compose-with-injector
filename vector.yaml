sources:
  tcp_logs:
    type: socket
    mode: tcp
    address: 0.0.0.0:5170
    encoding:
      codec: text

  vector_metrics:
    type: internal_metrics


transforms:
  extract_marker:
    type: remap
    inputs:
      - tcp_logs
    source: >-
      . |= parse_regex!(.message, r'_>(?P<marker>[^<]+)<_');
      kvp = parse_regex(.message, r'.kv:(?P<kv>.*)') ?? {};
      .labels = parse_key_value(value: to_string!(kvp.kv), field_delimiter:",") ?? {"default":42}
     
sinks:
  printer:
    type: console
    inputs: 
      - extract_marker
    encoding:
      codec: json

  loki:
    type: loki
    inputs:
      - extract_marker
    endpoint: http://loki:3100
    encoding:
      codec: json
    labels:
      source: vector
      marker: "{{marker}}"
      "*": "{{labels}}"
    buffer:
    - type: disk
      max_size: 1073741824 # 1GiB.
      when_full: drop_newest

  prometheus:
    type: prometheus_exporter
    address: 0.0.0.0:9598

    inputs:
      - vector_metrics