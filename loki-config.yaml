auth_enabled: false

server:
  http_listen_port: 3100
  http_listen_address: 0.0.0.0
  #log_level: war
  
common:
  path_prefix: /loki
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1  # Adresse locale
    kvstore:
      store: inmemory

  storage:
    s3:
      endpoint: minio:9000
      insecure: true
      bucketnames: loki
      access_key_id: admin
      secret_access_key: password
      s3forcepathstyle: true

schema_config:
  configs:
    - from: 2024-01-01  # Date de début du nouveau schéma
      store: tsdb        # Obligatoire pour v13
      object_store: s3   # Stockage S3 (MinIO)
      schema: v13        # Schéma requis
      index:
        prefix: index_
        period: 24h


